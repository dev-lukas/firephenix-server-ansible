---
- name: Install Docker prerequisites
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - gnupg
    state: present

- name: Create Docker keyrings directory
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

- name: Download Docker GPG key
  ansible.builtin.shell:
    cmd: |
      curl -fsSL https://download.docker.com/linux/debian/gpg \
      | gpg --dearmor -o /etc/apt/keyrings/docker.gpg --yes
    creates: /etc/apt/keyrings/docker.gpg

- name: Set Docker GPG key permissions
  ansible.builtin.file:
    path: /etc/apt/keyrings/docker.gpg
    mode: "0644"

- name: Configure Docker repository
  ansible.builtin.apt_repository:
    repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/debian {{ ansible_distribution_release }} stable"
    state: present
    filename: docker

- name: Install Docker Engine and plugins
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: present
    update_cache: true

- name: Ensure Docker service is enabled
  ansible.builtin.systemd:
    name: docker
    state: started
    enabled: true

- name: Configure Docker container egress
  ansible.builtin.include_tasks: egress.yml

- name: Add admin user to docker group
  ansible.builtin.user:
    name: "{{ docker_host_admin_user }}"
    groups: docker
    append: true
  when: docker_host_admin_user != "root"

- name: Create FirePhenix stack directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - "{{ docker_host_stack_dir }}"
    - "{{ docker_host_backup_dir }}"

- name: Apply registry hosts override
  ansible.builtin.lineinfile:
    path: /etc/hosts
    regexp: "\\s{{ docker_host_registry_url | regex_escape() }}$"
    line: "{{ docker_host_registry_public_ip_override }} {{ docker_host_registry_url }}"
    state: present
  when: docker_host_registry_public_ip_override | length > 0

- name: Resolve private registry address
  ansible.builtin.shell:
    cmd: "getent ahostsv4 {{ docker_host_registry_url }} | awk '{ print $1; exit }'"
  register: docker_host_registry_resolved_ip
  changed_when: false
  failed_when: docker_host_registry_resolved_ip.stdout | length == 0

- name: Reject private registry DNS for VPS image pulls
  ansible.builtin.assert:
    that:
      - docker_host_registry_allow_private_dns | bool or not (
          docker_host_registry_resolved_ip.stdout is match('^10\\.') or
          docker_host_registry_resolved_ip.stdout is match('^127\\.') or
          docker_host_registry_resolved_ip.stdout is match('^172\\.(1[6-9]|2[0-9]|3[0-1])\\.') or
          docker_host_registry_resolved_ip.stdout is match('^192\\.168\\.')
        )
    fail_msg: >-
      {{ docker_host_registry_url }} resolves to {{ docker_host_registry_resolved_ip.stdout }},
      which is a private address and is not reachable from the VPS. Fix public DNS,
      set firephenix_registry_public_ip_override to the public homeserver IP, or set
      firephenix_registry_allow_private_dns=true only if the VPS can route to that private network.

- name: Verify private registry endpoint is reachable
  ansible.builtin.uri:
    url: "https://{{ docker_host_registry_url }}/v2/"
    method: GET
    status_code:
      - 200
      - 401
    timeout: 15
  register: docker_host_registry_probe
  changed_when: false

- name: Validate private registry credentials are configured
  ansible.builtin.assert:
    that:
      - docker_host_registry_username | length > 0
      - docker_host_registry_password | length > 0
    fail_msg: >-
      Registry credentials are required for {{ docker_host_registry_url }}.
      Set firephenix_registry_username and vault_firephenix_registry_password before deployment.

- name: Log into private registry
  community.docker.docker_login:
    registry_url: "{{ docker_host_registry_url }}"
    username: "{{ docker_host_registry_username }}"
    password: "{{ docker_host_registry_password }}"
  no_log: true
