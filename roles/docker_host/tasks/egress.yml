---
- name: Persist IPv4 forwarding for Docker bridge egress
  ansible.builtin.copy:
    dest: /etc/sysctl.d/60-docker-egress.conf
    mode: "0644"
    content: |
      # Required for Docker bridge NAT so containers can reach external APIs.
      net.ipv4.ip_forward = 1
      # Required for the IPv6-enabled edge network so inbound IPv6 reaches
      # published ports via ip6tables DNAT instead of the userland proxy.
      net.ipv6.conf.all.forwarding = 1

- name: Enable IP forwarding for running Docker containers
  ansible.builtin.command:
    cmd: "sysctl -w {{ item }}"
  loop:
    - net.ipv4.ip_forward=1
    - net.ipv6.conf.all.forwarding=1
  changed_when: false
