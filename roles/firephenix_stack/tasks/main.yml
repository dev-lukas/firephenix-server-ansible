---
- name: Ensure FirePhenix stack directory exists
  ansible.builtin.file:
    path: "{{ firephenix_stack_dir }}"
    state: directory
    mode: "0755"

- name: Ensure FirePhenix data directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - "{{ firephenix_stack_dir }}/data"
    - "{{ firephenix_teamspeak_data_dir }}"

- name: Deploy FirePhenix docker-compose file
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ firephenix_stack_dir }}/docker-compose.yml"
    mode: "0644"

- name: Deploy FirePhenix service environment files
  ansible.builtin.template:
    src: "{{ item.src }}"
    dest: "{{ firephenix_stack_dir }}/{{ item.dest }}"
    mode: "0600"
  loop:
    - src: env-database.j2
      dest: .env.database
    - src: env-backend.j2
      dest: .env.backend
    - src: env-bot.j2
      dest: .env.bot
  no_log: true

- name: Remove legacy shared environment file
  ansible.builtin.file:
    path: "{{ firephenix_stack_dir }}/.env"
    state: absent
  no_log: true

- name: Validate docker-compose configuration
  ansible.builtin.command:
    cmd: docker compose config --quiet
    chdir: "{{ firephenix_stack_dir }}"
  changed_when: false

- name: Pull selected FirePhenix service images
  ansible.builtin.command:
    argv: "{{ ['docker', 'compose', 'pull'] + firephenix_stack_pull_services }}"
    chdir: "{{ firephenix_stack_dir }}"
  when: firephenix_stack_pull_services | length > 0
  changed_when: false

- name: Start selected FirePhenix services
  ansible.builtin.command:
    argv: "{{ ['docker', 'compose', 'up', '-d'] + (['--no-deps'] if firephenix_stack_no_deps | bool else []) + firephenix_stack_services }}"
    chdir: "{{ firephenix_stack_dir }}"
  when:
    - firephenix_stack_start_services | bool
    - firephenix_stack_services | length > 0
  changed_when: false

- name: Start full FirePhenix stack
  ansible.builtin.command:
    cmd: docker compose up -d
    chdir: "{{ firephenix_stack_dir }}"
  when:
    - firephenix_stack_start_services | bool
    - firephenix_stack_services | length == 0
  changed_when: false
