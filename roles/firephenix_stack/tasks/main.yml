---
- name: Ensure FirePhenix stack directory exists
  ansible.builtin.file:
    path: "{{ firephenix_stack_dir }}"
    state: directory
    mode: "0755"

- name: Ensure FirePhenix data directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - "{{ firephenix_stack_dir }}/data"
    - "{{ firephenix_teamspeak_data_dir }}"
    - "{{ firephenix_ttt_data_dir }}"

- name: Ensure TeamSpeak query allowlist exists
  ansible.builtin.file:
    path: "{{ firephenix_teamspeak_data_dir }}/query_ip_allowlist.txt"
    state: touch
    mode: "0664"

- name: Allow Docker internal network for TeamSpeak ServerQuery
  ansible.builtin.lineinfile:
    path: "{{ firephenix_teamspeak_data_dir }}/query_ip_allowlist.txt"
    line: "{{ item }}"
    create: true
    mode: "0664"
  loop: "{{ firephenix_teamspeak_query_allowlist }}"

- name: Deploy FirePhenix docker-compose file
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ firephenix_stack_dir }}/docker-compose.yml"
    mode: "0644"

- name: Deploy FirePhenix service environment files
  ansible.builtin.template:
    src: "{{ item.src }}"
    dest: "{{ firephenix_stack_dir }}/{{ item.dest }}"
    mode: "0600"
  loop:
    - src: env-database.j2
      dest: .env.database
    - src: env-backend.j2
      dest: .env.backend
    - src: env-bot.j2
      dest: .env.bot
    - src: env-ttt.j2
      dest: .env.ttt
  no_log: true

- name: Install Counter-Strike Source content for TTT
  ansible.builtin.shell: |
    set -euo pipefail
    work_parent="{{ firephenix_ttt_css_work_dir }}"
    mkdir -p "$work_parent"
    work_dir="$(mktemp -d "$work_parent/install.XXXXXX")"
    container_name="firephenix-css-content-install-ansible"
    cleanup() {
      docker rm -f "$container_name" >/dev/null 2>&1 || true
      rm -rf "$work_dir"
    }
    trap cleanup EXIT

    chmod 0777 "$work_dir"
    docker rm -f "$container_name" >/dev/null 2>&1 || true
    source_dir="$work_dir/serverfiles/cstrike"
    target_dir="{{ firephenix_ttt_data_dir }}/serverfiles/cstrike"
    logs_file="$work_dir/css-install.log"
    install_timeout="{{ firephenix_ttt_css_install_timeout_seconds }}"

    timeout --kill-after=60s "$install_timeout" docker run \
      --name "$container_name" \
      --rm \
      -v "$work_dir:/data" \
      --entrypoint /bin/bash \
      "{{ firephenix_ttt_css_image }}" \
      -lc '
        set -euo pipefail
        export HOME=/data
        gameserver="${GAMESERVER:-cssserver}"
        serverfiles="${LGSM_SERVERFILES:-/data/serverfiles}"
        logdir="${LGSM_LOGDIR:-/data/log}"
        configdir="${LGSM_CONFIG:-/data/lgsm/config-lgsm}"
        datadir="${LGSM_DATADIR:-/data/lgsm/data}"

        mkdir -p \
          "$serverfiles" \
          "$logdir/script" \
          "$logdir/console" \
          "$configdir" \
          "$datadir"
        chown -R linuxgsm:linuxgsm /data /app
        cd /app

        export gameserver serverfiles logdir configdir datadir
        gosu linuxgsm bash -lc '"'"'
          set -euo pipefail
          cd /app

          if [ ! -f "$gameserver" ]; then
            ./linuxgsm.sh "$gameserver"
          fi

          ensure_link() {
            link_path="$1"
            target_path="$2"
            if [ ! -e "$link_path" ] && [ ! -L "$link_path" ]; then
              ln -s "$target_path" "$link_path"
            fi
          }

          ensure_link /app/lgsm/config-lgsm "$configdir"
          ensure_link /app/serverfiles "$serverfiles"
          ensure_link /app/log "$logdir"
          ensure_link /app/lgsm/data "$datadir"

          ./"$gameserver" auto-install install=1
        '"'"'
      ' 2>&1 | tee "$logs_file"

    if [ ! -f "$source_dir/gameinfo.txt" ]; then
      echo "CS:S LinuxGSM install completed without cstrike/gameinfo.txt" >&2
      echo "Installer output:" >&2
      cat "$logs_file" >&2 || true
      exit 1
    fi

    if ! find "$source_dir" -mindepth 1 -maxdepth 1 | read -r _; then
      echo "CS:S LinuxGSM install produced an empty cstrike directory" >&2
      echo "Installer output:" >&2
      cat "$logs_file" >&2 || true
      exit 1
    fi
    docker rm "$container_name" >/dev/null 2>&1 || true

    mkdir -p "$(dirname "$target_dir")"
    if command -v rsync >/dev/null 2>&1; then
      mkdir -p "$target_dir"
      rsync -a --delete "$source_dir/" "$target_dir/"
    else
      rm -rf "$target_dir"
      mkdir -p "$target_dir"
      cp -a "$source_dir/." "$target_dir/"
    fi
  args:
    executable: /bin/bash
    creates: "{{ firephenix_ttt_data_dir }}/serverfiles/cstrike/gameinfo.txt"
  tags:
    - never
    - ttt_css_content

- name: Remove legacy shared environment file
  ansible.builtin.file:
    path: "{{ firephenix_stack_dir }}/.env"
    state: absent
  no_log: true

- name: Validate docker-compose configuration
  ansible.builtin.command:
    cmd: docker compose config --quiet
    chdir: "{{ firephenix_stack_dir }}"
  changed_when: false

- name: Pull selected FirePhenix service images
  ansible.builtin.command:
    argv: "{{ ['docker', 'compose', 'pull'] + firephenix_stack_pull_services }}"
    chdir: "{{ firephenix_stack_dir }}"
  when: firephenix_stack_pull_services | length > 0
  changed_when: false

- name: Start selected FirePhenix services
  ansible.builtin.command:
    argv: "{{ ['docker', 'compose', 'up', '-d'] + (['--no-deps'] if firephenix_stack_no_deps | bool else []) + firephenix_stack_services }}"
    chdir: "{{ firephenix_stack_dir }}"
  when:
    - firephenix_stack_start_services | bool
    - firephenix_stack_services | length > 0
  changed_when: false

- name: Start full FirePhenix stack
  ansible.builtin.command:
    cmd: docker compose up -d
    chdir: "{{ firephenix_stack_dir }}"
  when:
    - firephenix_stack_start_services | bool
    - firephenix_stack_services | length == 0
  changed_when: false
