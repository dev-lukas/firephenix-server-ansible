---
- name: Perform routine maintenance on the new FirePhenix server
  hosts: firephenix
  gather_facts: false
  vars_files:
    - ../inventory/group_vars/vault.yml
  vars:
    # Maintenance is safe for a live server and must never restore or reset
    # persistent data. Explicit extra-vars still win and are rejected below.
    firephenix_local_backup_archive: ""
    firephenix_restore_database: false
    firephenix_restore_database_reset: false
    firephenix_restore_teamspeak: false
  pre_tasks:
    - name: Refuse restore inputs in live maintenance
      ansible.builtin.assert:
        that:
          - firephenix_local_backup_archive | default('') | length == 0
          - not (firephenix_restore_database | default(false) | bool)
          - not (firephenix_restore_database_reset | default(false) | bool)
          - not (firephenix_restore_teamspeak | default(false) | bool)
        fail_msg: >-
          playbooks/maintenance.yml is a non-restore live maintenance playbook.
          Do not pass backup or restore variables to it; use playbooks/creation.yml
          only for an intentional rebuild/restore.

    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Upgrade packages
      ansible.builtin.apt:
        upgrade: safe

    - name: Remove unused packages
      ansible.builtin.apt:
        autoremove: true
        autoclean: true

    - name: Ensure Docker containers can reach external APIs
      ansible.builtin.import_role:
        name: docker_host
        tasks_from: egress
      tags:
        - docker_egress

    - name: Reapply UFW firewall port rules
      ansible.builtin.import_role:
        name: base_server
        tasks_from: ufw
      tags:
        - ufw
        - firewall

  roles:
    - role: ci_deploy_user
      tags:
        - ci_deploy_user
    - role: firephenix_stack
      vars:
        firephenix_stack_pull_services:
          - backend
          - bot
          - website
          - portfolio
          - ttt
        firephenix_stack_start_services: true
      tags:
        - firephenix_stack
    - role: nginx_edge
      vars:
        nginx_edge_manage_packages: false
        nginx_edge_manage_bootstrap_certificate: false
        nginx_edge_manage_certbot: false
        nginx_edge_manage_crowdsec: false
      tags:
        - nginx_edge

  tasks:
    - name: Prune unused Docker images
      ansible.builtin.command:
        cmd: docker image prune -f
      changed_when: false

    - name: Validate nginx configuration
      ansible.builtin.command:
        cmd: nginx -t
      changed_when: false

    - name: Reload nginx
      ansible.builtin.systemd:
        name: nginx
        state: reloaded

    - name: Refresh CrowdSec hub
      ansible.builtin.command:
        cmd: cscli hub update
      changed_when: false
      failed_when: false

    - name: Upgrade CrowdSec hub content
      ansible.builtin.command:
        cmd: cscli hub upgrade
      changed_when: false
      failed_when: false

    - name: Restart CrowdSec services
      ansible.builtin.systemd:
        name: "{{ item }}"
        state: restarted
      loop:
        - crowdsec
        - crowdsec-firewall-bouncer
